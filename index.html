<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14171A;
    --panel: #1B1F22;
    --panel-border: #262B2F;
    --text: #E8E6E1;
    --text-dim: #8A8F94;
    --text-faint: #565C61;
    --cell-empty: #21262A;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
  }
  .wrap{
    max-width: 880px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }
  header{
    margin-bottom: 44px;
  }
  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 0 10px;
  }
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 34px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .sub{
    color: var(--text-dim);
    font-size: 14px;
    margin: 0;
    line-height: 1.6;
  }
  .totals{
    display:flex;
    gap: 28px;
    margin-top: 26px;
    flex-wrap: wrap;
  }
  .totals .stat .num{
    font-family:'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 600;
  }
  .totals .stat .lbl{
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .habit-card{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 22px 24px 24px;
    margin-bottom: 20px;
  }
  .habit-head{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .habit-name{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .dot{
    width: 9px; height: 9px;
    border-radius: 2px;
    flex-shrink:0;
  }
  .metrics{
    display:flex;
    gap: 18px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .metrics b{
    color: var(--text);
    font-weight: 600;
  }
  .streak-mark{
    display:inline-block;
    margin-left: 2px;
  }
  .grid-scroll{
    overflow-x: auto;
    padding-bottom: 6px;
  }
  .grid-inner{
    display:flex;
    gap: 3px;
  }
  .week-col{
    display:flex;
    flex-direction: column;
    gap: 3px;
  }
  .cell{
    width: 10px; height: 10px;
    border-radius: 2px;
    background: var(--cell-empty);
  }
  .month-labels{
    display:flex;
    gap:3px;
    margin-bottom: 6px;
    font-size: 10px;
    color: var(--text-faint);
    height: 12px;
  }
  .month-labels span{
    width: 10px;
    position: relative;
    white-space: nowrap;
  }
  footer{
    margin-top: 36px;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.7;
  }
  footer code{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">habit field</p>
    <h1>今年、何を育てたか</h1>
    <p class="sub">data.json を編集して今日の日付を追加するだけ。commit した瞬間、ここに1マス増える。</p>
    <div class="totals" id="totals"></div>
  </header>

  <div id="habits"></div>

  <footer>
    データソース: <code>./data.json</code> — 習慣を1日やったら、その習慣の <code>dates</code> 配列に <code>"YYYY-MM-DD"</code> を1行追加して commit してください。
  </footer>
</div>

<script>
const FALLBACK_DATA = {
  "habits": [
    { "id": "english", "name": "英語イマージョンラーニング", "color": "#5B7FD1", "dates": [] },
    { "id": "french", "name": "フランス語 Pimsleur", "color": "#C77DBA", "dates": [] },
    { "id": "razavi", "name": "ラザビ本", "color": "#D9A441", "dates": [] }
  ]
};

const DAY_MS = 24 * 60 * 60 * 1000;
const MONTHS_JA = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

function toDateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function shadeForColor(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function computeStreaks(dateSet, today){
  // current streak: consecutive days ending today (or yesterday if today not done yet)
  let cursor = new Date(today);
  if(!dateSet.has(toDateKey(cursor))){
    cursor = new Date(cursor.getTime() - DAY_MS);
  }
  let current = 0;
  while(dateSet.has(toDateKey(cursor))){
    current++;
    cursor = new Date(cursor.getTime() - DAY_MS);
  }

  // longest streak within the visible range
  const sorted = Array.from(dateSet).sort();
  let longest = 0, run = 0, prev = null;
  for(const key of sorted){
    if(prev){
      const gapDays = Math.round((new Date(key) - new Date(prev)) / DAY_MS);
      run = (gapDays === 1) ? run + 1 : 1;
    } else {
      run = 1;
    }
    longest = Math.max(longest, run);
    prev = key;
  }
  return { current, longest, total: dateSet.size };
}

function buildHeatmap(habit, today){
  const dateSet = new Set(habit.dates);
  const weeksToShow = 53;
  const totalDays = weeksToShow * 7;

  // align end to the upcoming Saturday so columns look like GitHub's grid
  const endDow = today.getDay(); // 0 = Sun
  const end = new Date(today.getTime() + (6 - endDow) * DAY_MS);
  const start = new Date(end.getTime() - (totalDays - 1) * DAY_MS);

  const gridInner = document.createElement('div');
  gridInner.className = 'grid-inner';

  const monthLabels = document.createElement('div');
  monthLabels.className = 'month-labels';

  let lastMonth = -1;
  for(let w = 0; w < weeksToShow; w++){
    const col = document.createElement('div');
    col.className = 'week-col';

    const weekStart = new Date(start.getTime() + w * 7 * DAY_MS);
    const labelSpan = document.createElement('span');
    if(weekStart.getMonth() !== lastMonth){
      labelSpan.textContent = MONTHS_JA[weekStart.getMonth()];
      lastMonth = weekStart.getMonth();
    }
    monthLabels.appendChild(labelSpan);

    for(let d = 0; d < 7; d++){
      const day = new Date(weekStart.getTime() + d * DAY_MS);
      const cell = document.createElement('div');
      cell.className = 'cell';
      if(day <= today){
        const key = toDateKey(day);
        if(dateSet.has(key)){
          cell.style.background = habit.color;
        }
        cell.title = key + (dateSet.has(key) ? ' ✓' : '');
      } else {
        cell.style.opacity = '0.35';
      }
      col.appendChild(cell);
    }
    gridInner.appendChild(col);
  }

  const scroll = document.createElement('div');
  scroll.className = 'grid-scroll';
  const stack = document.createElement('div');
  stack.appendChild(monthLabels);
  stack.appendChild(gridInner);
  scroll.appendChild(stack);
  return scroll;
}

function render(data){
  const today = new Date();
  today.setHours(0,0,0,0);

  const habitsEl = document.getElementById('habits');
  const totalsEl = document.getElementById('totals');
  habitsEl.innerHTML = '';

  let grandTotal = 0;
  let bestCurrentStreak = { name: '-', current: 0 };

  data.habits.forEach(habit => {
    const dateSet = new Set(habit.dates);
    const streaks = computeStreaks(dateSet, today);
    grandTotal += streaks.total;
    if(streaks.current > bestCurrentStreak.current){
      bestCurrentStreak = { name: habit.name, current: streaks.current };
    }

    const card = document.createElement('div');
    card.className = 'habit-card';

    const head = document.createElement('div');
    head.className = 'habit-head';
    head.innerHTML = `
      <div class="habit-name"><span class="dot" style="background:${habit.color}"></span>${habit.name}</div>
      <div class="metrics">
        <span>連続 <b>${streaks.current}</b>日</span>
        <span>最長 <b>${streaks.longest}</b>日</span>
        <span>累計 <b>${streaks.total}</b>日</span>
      </div>
    `;
    card.appendChild(head);
    card.appendChild(buildHeatmap(habit, today));
    habitsEl.appendChild(card);
  });

  totalsEl.innerHTML = `
    <div class="stat"><div class="num">${grandTotal}</div><div class="lbl">total days logged</div></div>
    <div class="stat"><div class="num">${bestCurrentStreak.current}</div><div class="lbl">best active streak (${bestCurrentStreak.name})</div></div>
    <div class="stat"><div class="num">${data.habits.length}</div><div class="lbl">habits tracked</div></div>
  `;
}

fetch('./data.json')
  .then(res => { if(!res.ok) throw new Error('no data.json'); return res.json(); })
  .then(render)
  .catch(() => render(FALLBACK_DATA));
</script>
</body>
</html>
